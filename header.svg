<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="240" viewBox="0 0 1000 240" fill="none" role="img" aria-label="Emmanuel Effi — Fullstack Engineer and Founder">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@400;500;700;800&amp;display=swap');
      .name   { font-family: 'Host Grotesk', system-ui, sans-serif; font-weight: 800; }
      .accent { font-family: 'Host Grotesk', system-ui, sans-serif; font-weight: 500; letter-spacing: 0.12em; }
      .role   { font-family: 'Host Grotesk', system-ui, sans-serif; font-weight: 500; letter-spacing: 0.18em; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="240" rx="24" fill="url(#bg)"/>
  <rect width="1000" height="240" rx="24" fill="url(#fade)"/>

  <!-- accent -->
  <text x="500" y="78" text-anchor="middle" class="accent" font-size="26" fill="#DBEAFE">hey, I'm</text>

  <!-- name in Host Grotesk -->
  <text x="500" y="158" text-anchor="middle" class="name" font-size="76" fill="#ffffff">Emmanuel Effi</text>

  <!-- role -->
  <text x="500" y="200" text-anchor="middle" class="role" font-size="17" fill="#DBEAFE">FULLSTACK ENGINEER &#8226; FOUNDER</text>
</svg>
